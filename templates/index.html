<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математический кроссворд</title>
    <link rel="stylesheet" href="static/style.css">
    <script src="static/vendor/dom-to-image-more.min.js"></script>
    <script src="static/vendor/jspdf.umd.min.js"></script>
</head>
<body>

<div class="controls">
    <h1>Математический кроссворд</h1>

    <div class="form-group">
        <label>Количество уравнений: <span id="count-value" class="range-value">15</span></label>
        <div class="range-row">
            <span>10</span>
            <input type="range" id="count" min="10" max="50" value="15">
            <span>50</span>
        </div>
    </div>

    <div class="form-group">
        <label>Диапазон чисел: от 1 до <span id="range-value" class="range-value">20</span></label>
        <div class="range-row">
            <span>1</span>
            <input type="range" id="num-range" min="5" max="100" value="20">
            <span>100</span>
        </div>
    </div>

    <div class="form-group">
        <label>Операции:</label>
        <div class="checkbox-group">
            <label><input type="checkbox" id="op-add" checked> Сложение (+)</label>
            <label><input type="checkbox" id="op-sub" checked> Вычитание (&minus;)</label>
            <label><input type="checkbox" id="op-mul"> Умножение (&times;)</label>
        </div>
    </div>

    <div class="form-group">
        <label>Покрытие цифрами: <span id="fill-value" class="range-value">50%</span></label>
        <div class="range-row">
            <span>10%</span>
            <input type="range" id="fill-percent" min="10" max="80" value="50" step="5">
            <span>80%</span>
        </div>
    </div>

    <div class="btn-row">
        <button class="btn btn-primary" id="generate-btn">Сгенерировать</button>
        <button class="btn btn-answer hidden" id="answer-btn">Показать ответы</button>
        <button class="btn btn-secondary hidden" id="pdf-btn">Скачать PDF</button>
    </div>
    <div class="generate-hint">Генерация доступна не чаще одного раза в 3 секунды</div>

    <div class="status" id="status"></div>
    <div class="quota-remaining hidden" id="quota-remaining"></div>
    <div class="quota-message hidden" id="quota-message"></div>
</div>

<div id="crossword-wrapper">
    <div class="print-buttons">
        <button class="btn btn-secondary" id="print-btn">Распечатать кроссворд</button>
    </div>
    <div id="crossword-container">
        <div class="crossword-title">Математический кроссворд</div>
        <div id="crossword-info"></div>
        <div class="grid-center">
            <div id="crossword-grid"></div>
        </div>
        <div id="answer-key">
            <h3>Ответы:</h3>
            <div class="equations-list" id="equations-list"></div>
        </div>
    </div>
</div>

<script src="static/app.js"></script>
</body>
</html>
